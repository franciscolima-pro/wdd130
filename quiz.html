<!--Uma entrada de tipo. (preencha a pergunta em branco) text
Atribua os valores e atributo como "Q1".nameid
Um elemento. (pergunta de resposta curta) textarea
Atribua os valores e atributo como "Q2".nameid
Um elemento. (lista suspensa ou caixa de combinação) select
Atribua os valores e atributo como "Q3". nameid
O elemento select deve ter pelo menos três (3) com . optionsvalues-->
<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="quiz.css">
    </head>
    <body>
      <form>
        <div id="Q1">
            <label for="name" id="Q1">which attribute the for element corresponds to in the label element:</label>
            <input type="text" id="name">
        </div>
        <div id="Q2">
            <label for="Q2" id="Q2">What is the element legend function?</label>
            <textarea id="Q2" name="question2"></textarea>
        </div>
        <div id="Q3">
            <label for="answer" id="Q3">Which element can we use to submit our form information?</label>
            <select name="answer" id="answer">
                <option value="">select</option>
                <option value="">label</option>
                <option value="">button</option>
            </select>
        </div>
        <div>
            <label for="number" id="Q4">What value do I use to set the margin to fill the entire user's screen?</label>
            <input type="number" id="number">
        </div>
        <div>
            <label for="submit">Submit Quiz</label>
            <button type="button"></button>
        </div>
      </form>  
    </body>
